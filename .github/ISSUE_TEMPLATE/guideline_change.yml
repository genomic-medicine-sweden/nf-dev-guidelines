name: Guideline change proposal
description: Propose a change to the shared developer guidelines in this repo
labels: ["proposal"]
body:
  - type: markdown
    attributes:
      value: |
        Changes here are pulled into every consuming pipeline's
        `CONTRIBUTING.md`. Please describe and motivate the change here
        before opening a PR, and reference this issue from the PR. If you
        plan to open the PR yourself, assign yourself to this issue.

  - type: textarea
    id: description
    attributes:
      label: What should change?
      description: |
      	Describe the proposed change to the guidelines.
      	Remember that changes in common sections in this repository
      	are reflected in `CONTRIBUTING.md` of every consuming pipeline.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why is this needed?
      description: What problem does this solve, or what prompted this change?
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I will open a PR that references this issue
          required: false
