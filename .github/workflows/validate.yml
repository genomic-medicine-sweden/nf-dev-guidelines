name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check generator syntax
        run: python -m py_compile generator/generate.py

      - name: Generate with default test config
        run: |
          python generator/generate.py \
            --config .github/test-config.yaml \
            --guidelines . \
            --repo-root . \
            --output /tmp/CONTRIBUTING_test.md

      - name: Check output matches golden file
        run: |
          diff .github/expected-output.md /tmp/CONTRIBUTING_test.md || \
            (echo "Output differs from expected. Run 'make generate-golden' locally to update." && exit 1)

      - name: Generate with full test config (all optional vars)
        run: |
          python generator/generate.py \
            --config .github/test-config-full.yaml \
            --guidelines . \
            --repo-root . \
            --output /tmp/CONTRIBUTING_test_full.md

      - name: Generate with default sections + custom_sections anchoring
        run: |
          python generator/generate.py \
            --config .github/test-config-default-sections.yaml \
            --guidelines . \
            --repo-root . \
            --output /tmp/CONTRIBUTING_test_default_sections.md
          python3 - <<'EOF'
          headings = [
              "## General",
              "#### A custom section anchored after general",
              "## Coding conventions",
              "#### A custom section anchored before updating_contribution_guidelines",
              "## Updating contribution guidelines",
          ]
          text = open("/tmp/CONTRIBUTING_test_default_sections.md").read()
          positions = [text.find(h) for h in headings]
          if any(p == -1 for p in positions):
              missing = [h for h, p in zip(headings, positions) if p == -1]
              raise SystemExit(f"Missing expected heading(s): {missing}")
          if positions != sorted(positions):
              raise SystemExit(f"Headings out of order: {list(zip(headings, positions))}")
          print("OK: default sections + custom_sections anchoring produced the expected order")
          EOF

      - name: A stale DEFAULT_SECTIONS entry should warn, not fail
        run: |
          python3 - <<'EOF'
          import io
          import sys
          from pathlib import Path

          sys.path.insert(0, "generator")
          import generate

          # Simulates a maintainer deleting sections/<name>.md without updating
          # DEFAULT_SECTIONS: every consuming repo should still generate cleanly.
          generate.DEFAULT_SECTIONS.append("this_section_was_removed_upstream")

          config_path = Path("/tmp/stale-default-section-config.yaml")
          config_path.write_text(
              "title: Stale DEFAULT_SECTIONS test\n"
              "intro: \"Testing a stale DEFAULT_SECTIONS entry.\"\n"
              "vars:\n"
              "  repo_name: x\n"
              "  repo_url: x\n"
              "  codespaces_url: x\n"
              "  pre_commit_note: x\n"
              "  workflow_file: x\n"
              "  reuse_note: x\n"
              "  modules_note: x\n"
          )

          captured_stderr = io.StringIO()
          real_stderr, sys.stderr = sys.stderr, captured_stderr
          try:
              config = generate.Config(config_path=config_path, guidelines_dir=Path("."), repo_root=Path("."))
              output = config.to_string()
          finally:
              sys.stderr = real_stderr

          warning = captured_stderr.getvalue()
          if "WARNING: Section 'this_section_was_removed_upstream' not found" not in warning:
              raise SystemExit(f"Expected warning not printed. stderr was:\n{warning}")
          if "this_section_was_removed_upstream" in output:
              raise SystemExit("Missing section should not appear in generated output")
          print("OK: a stale DEFAULT_SECTIONS entry warns and is skipped, generation still succeeds")
          EOF

      - name: A custom_sections anchor pointing at a removed/excluded section should warn, not fail
        run: |
          python3 - <<'EOF'
          import io
          import sys
          from pathlib import Path

          sys.path.insert(0, "generator")
          import generate

          # Simulates a default section a custom_sections entry anchors to being removed
          # from DEFAULT_SECTIONS (or excluded locally): the sync must still succeed.
          generate.DEFAULT_SECTIONS.remove("coding_conventions")

          custom_section_path = Path("/tmp/orphaned-custom-section.md")
          custom_section_path.write_text("#### Orphaned custom section\n\nShould be skipped, not crash.\n")

          config_path = Path("/tmp/orphaned-anchor-config.yaml")
          config_path.write_text(
              "title: Orphaned anchor test\n"
              "intro: \"Testing a custom_sections anchor whose target no longer exists.\"\n"
              "custom_sections:\n"
              f"  - file: {custom_section_path}\n"
              "    after: coding_conventions\n"
              "vars:\n"
              "  repo_name: x\n"
              "  repo_url: x\n"
              "  codespaces_url: x\n"
              "  pre_commit_note: x\n"
              "  workflow_file: x\n"
              "  reuse_note: x\n"
              "  modules_note: x\n"
          )

          captured_stderr = io.StringIO()
          real_stderr, sys.stderr = sys.stderr, captured_stderr
          try:
              config = generate.Config(config_path=config_path, guidelines_dir=Path("."), repo_root=Path("."))
              output = config.to_string()
          finally:
              sys.stderr = real_stderr

          warning = captured_stderr.getvalue()
          if "WARNING" not in warning or "after: coding_conventions" not in warning:
              raise SystemExit(f"Expected a warning about the orphaned anchor. stderr was:\n{warning}")
          if "Orphaned custom section" in output:
              raise SystemExit("Custom section with an orphaned anchor should not appear in generated output")
          print("OK: an orphaned custom_sections anchor warns and is skipped, generation still succeeds")
          EOF

      - name: Lint both outputs
        run: |
          python3 - <<'EOF'
          import re, sys

          files = {
              "default config": "/tmp/CONTRIBUTING_test.md",
              "full config": "/tmp/CONTRIBUTING_test_full.md",
          }
          failed = False
          for label, path in files.items():
              text = open(path).read()
              if re.search(r"\n{3,}", text):
                  print(f"FAIL [{label}]: 3+ consecutive blank lines found")
                  failed = True
              if "{{" in text or "}}" in text:
                  print(f"FAIL [{label}]: unrendered Jinja2 markers found")
                  failed = True
              trailing = len(text) - len(text.rstrip("\n"))
              if trailing != 1:
                  print(f"FAIL [{label}]: ends with {trailing} trailing newline(s), expected 1")
                  failed = True
              if not failed:
                  print(f"OK   [{label}]: {len(text.splitlines())} lines — passes all checks")
          sys.exit(1 if failed else 0)
          EOF
