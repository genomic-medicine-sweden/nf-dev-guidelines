name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check generator syntax
        run: python -m py_compile generator/generate.py

      - name: Generate with default test config
        run: |
          python generator/generate.py \
            --config .github/test-config.yaml \
            --guidelines . \
            --repo-root . \
            --output /tmp/CONTRIBUTING_test.md

      - name: Check output matches golden file
        run: |
          diff .github/expected-output.md /tmp/CONTRIBUTING_test.md || \
            (echo "Output differs from expected. Run 'make generate-golden' locally to update." && exit 1)

      - name: Generate with full test config (all optional vars)
        run: |
          python generator/generate.py \
            --config .github/test-config-full.yaml \
            --guidelines . \
            --repo-root . \
            --output /tmp/CONTRIBUTING_test_full.md

      - name: Generate with default sections + custom_sections anchoring
        run: |
          python generator/generate.py \
            --config .github/test-config-default-sections.yaml \
            --guidelines . \
            --repo-root . \
            --output /tmp/CONTRIBUTING_test_default_sections.md
          python3 - <<'EOF'
          headings = [
              "## General",
              "#### A custom section anchored after general",
              "## Coding conventions",
              "#### A custom section anchored before updating_contribution_guidelines",
              "## Updating contribution guidelines",
          ]
          text = open("/tmp/CONTRIBUTING_test_default_sections.md").read()
          positions = [text.find(h) for h in headings]
          if any(p == -1 for p in positions):
              missing = [h for h, p in zip(headings, positions) if p == -1]
              raise SystemExit(f"Missing expected heading(s): {missing}")
          if positions != sorted(positions):
              raise SystemExit(f"Headings out of order: {list(zip(headings, positions))}")
          print("OK: default sections + custom_sections anchoring produced the expected order")
          EOF

      - name: Generate with a removed/unknown section (should warn, not fail)
        run: |
          python generator/generate.py \
            --config .github/test-config-missing-section.yaml \
            --guidelines . \
            --repo-root . \
            --output /tmp/CONTRIBUTING_test_missing_section.md 2> /tmp/missing_section_stderr.txt
          grep -q "WARNING: Section 'this_section_was_removed_upstream' not found" /tmp/missing_section_stderr.txt || \
            (echo "Expected warning about missing section was not printed" && exit 1)
          grep -q "this_section_was_removed_upstream" /tmp/CONTRIBUTING_test_missing_section.md && \
            (echo "Missing section should not appear in generated output" && exit 1) || true

      - name: Lint both outputs
        run: |
          python3 - <<'EOF'
          import re, sys

          files = {
              "default config": "/tmp/CONTRIBUTING_test.md",
              "full config": "/tmp/CONTRIBUTING_test_full.md",
          }
          failed = False
          for label, path in files.items():
              text = open(path).read()
              if re.search(r"\n{3,}", text):
                  print(f"FAIL [{label}]: 3+ consecutive blank lines found")
                  failed = True
              if "{{" in text or "}}" in text:
                  print(f"FAIL [{label}]: unrendered Jinja2 markers found")
                  failed = True
              trailing = len(text) - len(text.rstrip("\n"))
              if trailing != 1:
                  print(f"FAIL [{label}]: ends with {trailing} trailing newline(s), expected 1")
                  failed = True
              if not failed:
                  print(f"OK   [{label}]: {len(text.splitlines())} lines — passes all checks")
          sys.exit(1 if failed else 0)
          EOF
